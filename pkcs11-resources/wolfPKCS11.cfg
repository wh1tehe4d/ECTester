name = wolfPKCS11

library = /usr/local/lib/libwolfpkcs11.so

attributes(generate, CKO_PRIVATE_KEY, *) = {
  CKA_DERIVE = true
  CKA_SIGN = true
  CKA_SENSITIVE = false
  CKA_EXTRACTABLE = true
  CKA_TOKEN = true
}

attributes(generate, CKO_PUBLIC_KEY, *) = {
  CKA_TOKEN = true
}

attributes(generate, CKO_SECRET_KEY, *) = {
  CKA_EXTRACTABLE = true
  CKA_SENSITIVE = false
}
