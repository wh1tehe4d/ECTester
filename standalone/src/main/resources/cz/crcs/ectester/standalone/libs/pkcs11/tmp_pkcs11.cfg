name = SoftHSMv2-OpenSSL
library = /usr/local/lib/softhsm-openssl/libsofthsm2.so
attributes(generate, CKO_PRIVATE_KEY, *) = {
  CKA_EXTRACTABLE = true
  CKA_TOKEN = true
  CKA_DERIVE = true
  CKA_SIGN = true
  CKA_SENSITIVE = false
}
attributes(generate, CKO_PUBLIC_KEY, *) = {
  CKA_TOKEN = true
  CKA_DERIVE = true
  CKA_VERIFY = true
}
attributes(generate, CKO_SECRET_KEY, *) = {
  CKA_EXTRACTABLE = true
  CKA_SENSITIVE = false
}
